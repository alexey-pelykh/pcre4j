name: Build Natives

# This workflow is the single source of truth for the 5-platform PCRE2 native
# library matrix build. It is invoked in two modes:
#
#   - workflow_call: from .github/workflows/release.yaml during a tagged release,
#     where each matrix job uploads the built libpcre2-8.{so|dylib|dll} file for
#     its platform as an artifact, and the release's `package` job downloads
#     those artifacts and places them into
#     native/<platform>/src/main/resources/META-INF/native/<platform>/ before
#     running Gradle publish. This is the canonical release path.
#
#   - workflow_dispatch: for on-demand diagnostic builds (reproducing a
#     single-platform build off-cycle without triggering a full release).
#     See ADR-0010 (docs/adr/0010-native-bundle-release-procedure.md).

on:
  workflow_call:
    inputs:
      pcre2-version:
        description: 'PCRE2 version to build'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      pcre2-version:
        description: 'PCRE2 version to build'
        required: true
        default: '10.47'
        type: string

permissions: {}

jobs:

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
            lib-name: libpcre2-8.so
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            lib-name: libpcre2-8.so
          - os: macos-15
            platform: macos-aarch64
            lib-name: libpcre2-8.dylib
          # macos-15-intel is the last remaining x86_64 macOS runner.
          # macos-13 was deprecated 2025-09-22 and fully unsupported
          # 2025-12-08 (https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/);
          # macos-14-intel does not exist as a label (actions/runner-images#13164).
          # macos-15-intel itself retires in Fall 2027 when Apple's x86_64
          # architecture is removed from GitHub-hosted runners entirely.
          - os: macos-15-intel
            platform: macos-x86_64
            lib-name: libpcre2-8.dylib
          - os: windows-2025
            platform: windows-x86_64
            lib-name: pcre2-8.dll

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build PCRE2
        uses: ./.github/actions/build-pcre2
        with:
          version: ${{ inputs.pcre2-version }}

      - name: Locate built library
        id: locate
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows CMake puts DLLs in bin/
            lib_file=$(find /opt/pcre2 -name "${{ matrix.lib-name }}" -type f | head -1)
          else
            lib_file="/opt/pcre2/lib/${{ matrix.lib-name }}"
          fi
          if [[ ! -f "$lib_file" ]]; then
            echo "::error::Library not found: ${{ matrix.lib-name }}"
            find /opt/pcre2 -type f -name "*.so" -o -name "*.dylib" -o -name "*.dll" 2>/dev/null || true
            exit 1
          fi
          echo "lib-file=$lib_file" >> "$GITHUB_OUTPUT"
          echo "Found library: $lib_file"

      - name: Copy library to module resources
        shell: bash
        run: |
          target_dir="native/${{ matrix.platform }}/src/main/resources/META-INF/native/${{ matrix.platform }}"
          mkdir -p "$target_dir"
          cp "${{ steps.locate.outputs.lib-file }}" "$target_dir/${{ matrix.lib-name }}"
          echo "Copied to: $target_dir/${{ matrix.lib-name }}"
          ls -la "$target_dir/"

      - name: Upload native library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.platform }}
          path: native/${{ matrix.platform }}/src/main/resources/META-INF/native/${{ matrix.platform }}/${{ matrix.lib-name }}
          if-no-files-found: error
          retention-days: 7
