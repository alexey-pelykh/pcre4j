name: Release

# Two entry points:
#   1. tag push matching `[0-9]+.[0-9]+.[0-9]+` — full release: builds, stages,
#      and deploys artifacts to Maven Central via JReleaser.
#   2. `workflow_dispatch` — dry run: exercises the full matrix build + native
#      placement + verifyNativeBundles + publishAllPublicationsToStagingDeployRepository
#      pipeline but SKIPS the Maven Central deploy step. Use this to validate
#      the release pipeline produces non-empty native JARs before cutting a real
#      version. See #575.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the dry-run build (passed to Gradle as -Ppcre4j.version). Maven Central deploy is skipped regardless of this value.'
        required: false
        default: '0.0.0-dryrun'
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  # Single source of truth for the PCRE2 version built in this release. This
  # env var is consumed by the `package` job's `Build PCRE2` step below.
  # IMPORTANT: the reusable-workflow call to `build-natives.yaml` MUST pass the
  # same version as a literal string — GitHub Actions does not evaluate the
  # workflow-level `env` context inside reusable-workflow `with:` expressions,
  # so the two sites must be kept in lockstep by hand on any PCRE2 bump.
  PCRE2_VERSION: '10.47'
  # Version string passed to Gradle as `-Ppcre4j.version`. On tag push this is
  # the tag (e.g., `1.0.0`); on workflow_dispatch this is the dispatch input
  # (default `0.0.0-dryrun`).
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  # Build platform-specific PCRE2 native libraries on a 5-platform matrix and
  # upload each built libpcre2-8.{so|dylib|dll} file as a workflow artifact.
  # The `package` job downloads the 5 artifacts and places each library into
  # native/<platform>/src/main/resources/META-INF/native/<platform>/ before
  # running Gradle publish, so every pcre4j-native-<platform>-<version>.jar on
  # Maven Central carries its expected libpcre2-8.{so|dylib|dll}.
  #
  # See ADR-0010 (docs/adr/0010-native-bundle-release-procedure.md, Decision 1)
  # and umbrella issue #556 for the rationale.
  build-natives:
    # Keep `pcre2-version` in lockstep with `env.PCRE2_VERSION` above. See the
    # note on the env block for why a literal is used here.
    uses: ./.github/workflows/build-natives.yaml
    with:
      pcre2-version: '10.47'
    permissions:
      contents: read

  package:
    needs: build-natives

    runs-on: ubuntu-24.04

    permissions:
      contents: read

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v4

      # Need both JDKs for MRJAR build
      - name: Set up temurin-jdk-21 (for MRJAR base)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up temurin-jdk-22 (for MRJAR overlay)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 22

      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}

      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Build PCRE2
        uses: ./.github/actions/build-pcre2
        with:
          version: ${{ env.PCRE2_VERSION }}

      # Download per-platform native library artifacts produced by build-natives
      # and place each libpcre2-8.{so|dylib|dll} into its matching Gradle
      # module's resources. See .github/actions/place-native-artifacts for the
      # single source of truth shared with ci.yaml's snapshot path.
      - name: Place native artifacts
        uses: ./.github/actions/place-native-artifacts

      - name: Build artifacts
        run: ./gradlew build jacocoAggregatedTestReport -Dpcre2.library.path=/opt/pcre2/lib

      # Safety net: fail the release if any pcre4j-native-* JAR was staged without
      # the expected PCRE2 shared library (>= 10 KB). Guards against a recurrence
      # of the 1.0.0 empty-native regression. See #557.
      - name: Verify native bundles
        run: ./gradlew verifyNativeBundles -Ppcre4j.version=${{ env.RELEASE_VERSION }}

      - name: Stage artifacts
        run: ./gradlew publishAllPublicationsToStagingDeployRepository -Ppcre4j.version=${{ env.RELEASE_VERSION }}

      - name: Inspect staged native bundles
        run: .github/scripts/verify-staged-natives.sh .

      # Deploy to Maven Central ONLY on real tag-push releases. The compound
      # guard is deliberate belt-and-suspenders: the `push` trigger above is
      # already restricted to tag refs matching `[0-9]+.[0-9]+.[0-9]+`, but
      # checking `github.event_name == 'push' && github.ref_type == 'tag'`
      # structurally excludes any future `workflow_dispatch`, `pull_request`,
      # or other triggers from ever reaching the irreversible
      # publish-to-Maven-Central path. See #575 for the dry-run rationale.
      - name: Release to Maven Central
        if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: ./gradlew jreleaserDeploy --no-configuration-cache -Ppcre4j.version=${{ env.RELEASE_VERSION }}
